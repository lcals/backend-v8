name: build game release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag used by Game repo"
        required: true
        default: "11.8.172"
        type: string
      v8_revision:
        description: "V8 TAG(Branch) to build"
        required: true
        default: "11.8.172"
        type: choice
        options:
          - "9.4.146.24"
          - "11.8.172"
          - "12.9.202.27"
          - "13.6.233.17"
      wrap_new:
        description: "wrap new/delete"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "with_new_wrap"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wee8
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          bash ./linux.sh "${{ inputs.v8_revision }}" "${{ inputs.wrap_new }}"
      - name: Package Game asset
        shell: bash
        run: |
          set -euo pipefail
          ASSET_ROOT="$RUNNER_TEMP/backend-v8-linux-x64"
          mkdir -p "$ASSET_ROOT/Inc"
          mkdir -p "$ASSET_ROOT/lib/linux/x64/debug"
          mkdir -p "$ASSET_ROOT/lib/linux/x64/release"
          cp -R "$HOME/v8/v8/include/." "$ASSET_ROOT/Inc/"
          cp "$HOME/v8/v8/output/v8/Lib/Linux/libwee8.a" "$ASSET_ROOT/lib/linux/x64/debug/libwee8.a"
          cp "$HOME/v8/v8/output/v8/Lib/Linux/libwee8.a" "$ASSET_ROOT/lib/linux/x64/release/libwee8.a"
          cd "$ASSET_ROOT"
          zip -qr "$GITHUB_WORKSPACE/backend-v8-linux-x64.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-v8-linux-x64
          path: backend-v8-linux-x64.zip

  build-macos:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wee8
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          bash ./macos_arm64.sh "${{ inputs.v8_revision }}" "${{ inputs.wrap_new }}"
      - name: Package Game asset
        shell: bash
        run: |
          set -euo pipefail
          ASSET_ROOT="$RUNNER_TEMP/backend-v8-macos-arm64"
          mkdir -p "$ASSET_ROOT/Inc"
          mkdir -p "$ASSET_ROOT/lib/macos/arm64/debug"
          mkdir -p "$ASSET_ROOT/lib/macos/arm64/release"
          cp -R "$HOME/v8/v8/include/." "$ASSET_ROOT/Inc/"
          cp "$HOME/v8/v8/output/v8/Lib/macOS_arm64/libwee8.a" "$ASSET_ROOT/lib/macos/arm64/debug/libwee8.a"
          cp "$HOME/v8/v8/output/v8/Lib/macOS_arm64/libwee8.a" "$ASSET_ROOT/lib/macos/arm64/release/libwee8.a"
          cd "$ASSET_ROOT"
          zip -qr "$GITHUB_WORKSPACE/backend-v8-macos-arm64.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-v8-macos-arm64
          path: backend-v8-macos-arm64.zip

  build-windows:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wee8
        shell: cmd
        run: |
          call npm ci
          call .\windows_64.cmd "${{ inputs.v8_revision }}" "${{ inputs.wrap_new }}"
      - name: Package Game asset
        shell: powershell
        run: |
          $assetRoot = Join-Path $env:RUNNER_TEMP "backend-v8-windows-x64"
          New-Item -ItemType Directory -Force -Path (Join-Path $assetRoot "Inc") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $assetRoot "lib/windows/x64/debug") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $assetRoot "lib/windows/x64/release") | Out-Null
          Copy-Item "$env:USERPROFILE\v8\v8\include\*" (Join-Path $assetRoot "Inc") -Recurse -Force
          Copy-Item "$env:USERPROFILE\v8\v8\output\v8\Lib\Win64\wee8.lib" (Join-Path $assetRoot "lib/windows/x64/debug/wee8.lib") -Force
          Copy-Item "$env:USERPROFILE\v8\v8\output\v8\Lib\Win64\wee8.lib" (Join-Path $assetRoot "lib/windows/x64/release/wee8.lib") -Force
          Compress-Archive -Path (Join-Path $assetRoot "*") -DestinationPath "$env:GITHUB_WORKSPACE\backend-v8-windows-x64.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: backend-v8-windows-x64
          path: backend-v8-windows-x64.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/backend-v8-linux-x64/backend-v8-linux-x64.zip --clobber
            gh release upload "${RELEASE_TAG}" release-assets/backend-v8-macos-arm64/backend-v8-macos-arm64.zip --clobber
            gh release upload "${RELEASE_TAG}" release-assets/backend-v8-windows-x64/backend-v8-windows-x64.zip --clobber
          else
            gh release create "${RELEASE_TAG}" \
              release-assets/backend-v8-linux-x64/backend-v8-linux-x64.zip \
              release-assets/backend-v8-macos-arm64/backend-v8-macos-arm64.zip \
              release-assets/backend-v8-windows-x64/backend-v8-windows-x64.zip \
              --title "${RELEASE_TAG}" \
              --notes "Game repo backend-v8 packages"
          fi
